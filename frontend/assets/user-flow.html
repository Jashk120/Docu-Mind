<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuMind User Flow Diagram</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: Inter, sans-serif; background: radial-gradient(circle at 80% 0%, #312e81, #020617 58%); color: #e2e8f0; }
    .card { background: rgba(15,23,42,.75); border: 1px solid rgba(148,163,184,.35); box-shadow: 0 20px 50px rgba(0,0,0,.35); }
  </style>
</head>
<body class="min-h-screen p-6 md:p-10">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl md:text-4xl font-extrabold mb-2">DocuMind User Flow Diagram</h1>
    <p class="text-slate-300 mb-8">Journey map with decision branches and fallback states.</p>

    <div class="card rounded-2xl p-4 md:p-8 overflow-x-auto">
      <svg width="1280" height="860" viewBox="0 0 1280 860" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa" />
          </marker>
        </defs>

        <rect x="70" y="50" width="240" height="90" rx="12" fill="#0f172a" stroke="#64748b"/>
        <text x="95" y="86" fill="#e2e8f0" font-size="15" font-weight="700">1. Login (GitHub OAuth)</text>
        <text x="95" y="108" fill="#94a3b8" font-size="12">session.user.id + accessToken</text>

        <rect x="380" y="50" width="260" height="90" rx="12" fill="#0f172a" stroke="#64748b"/>
        <text x="405" y="86" fill="#e2e8f0" font-size="15" font-weight="700">2. Open Dashboard</text>
        <text x="405" y="108" fill="#94a3b8" font-size="12">Fetch /user/repos from GitHub</text>

        <rect x="710" y="50" width="280" height="90" rx="12" fill="#0f172a" stroke="#64748b"/>
        <text x="735" y="86" fill="#e2e8f0" font-size="15" font-weight="700">3. Select Repo + Run</text>
        <text x="735" y="108" fill="#94a3b8" font-size="12">POST /repos/docstring-pipeline/stream</text>

        <rect x="1040" y="50" width="180" height="90" rx="12" fill="#0f172a" stroke="#64748b"/>
        <text x="1060" y="88" fill="#e2e8f0" font-size="15" font-weight="700">4. SSE Progress</text>

        <line x1="310" y1="95" x2="380" y2="95" stroke="#60a5fa" stroke-width="3" marker-end="url(#a)"/>
        <line x1="640" y1="95" x2="710" y2="95" stroke="#60a5fa" stroke-width="3" marker-end="url(#a)"/>
        <line x1="990" y1="95" x2="1040" y2="95" stroke="#60a5fa" stroke-width="3" marker-end="url(#a)"/>

        <rect x="180" y="240" width="300" height="110" rx="12" fill="#0f172a" stroke="#64748b"/>
        <text x="205" y="276" fill="#e2e8f0" font-size="15" font-weight="700">5A. File Docstring Generation</text>
        <text x="205" y="298" fill="#94a3b8" font-size="12">Loop: GitHub file fetch + LLM call</text>
        <text x="205" y="318" fill="#94a3b8" font-size="12">May skip failed files and continue</text>

        <rect x="540" y="240" width="250" height="110" rx="12" fill="#0f172a" stroke="#64748b"/>
        <text x="565" y="276" fill="#e2e8f0" font-size="15" font-weight="700">5B. CONTEXT.md</text>
        <text x="565" y="298" fill="#94a3b8" font-size="12">Repository-level synthesis</text>

        <rect x="850" y="240" width="250" height="110" rx="12" fill="#0f172a" stroke="#64748b"/>
        <text x="875" y="276" fill="#e2e8f0" font-size="15" font-weight="700">5C. README.md</text>
        <text x="875" y="298" fill="#94a3b8" font-size="12">Generated from CONTEXT.md</text>

        <line x1="560" y1="140" x2="330" y2="240" stroke="#60a5fa" stroke-width="3" marker-end="url(#a)"/>
        <line x1="480" y1="295" x2="540" y2="295" stroke="#60a5fa" stroke-width="3" marker-end="url(#a)"/>
        <line x1="790" y1="295" x2="850" y2="295" stroke="#60a5fa" stroke-width="3" marker-end="url(#a)"/>

        <rect x="220" y="430" width="300" height="110" rx="12" fill="#0f172a" stroke="#64748b"/>
        <text x="245" y="466" fill="#e2e8f0" font-size="15" font-weight="700">6. PR Decision</text>
        <text x="245" y="488" fill="#94a3b8" font-size="12">If completion ratio >= 50%: create PR</text>
        <text x="245" y="508" fill="#94a3b8" font-size="12">Else: partial run, no PR</text>

        <rect x="610" y="430" width="300" height="110" rx="12" fill="#0f172a" stroke="#64748b"/>
        <text x="635" y="466" fill="#e2e8f0" font-size="15" font-weight="700">7. Persist Run</text>
        <text x="635" y="488" fill="#94a3b8" font-size="12">POST /api/runs</text>
        <text x="635" y="508" fill="#94a3b8" font-size="12">SQLite + storage/{owner}/{repo}/{timestamp}</text>

        <rect x="1000" y="430" width="220" height="110" rx="12" fill="#0f172a" stroke="#64748b"/>
        <text x="1025" y="466" fill="#e2e8f0" font-size="15" font-weight="700">8. Open Project</text>
        <text x="1025" y="488" fill="#94a3b8" font-size="12">/projects/[id]</text>
        <text x="1025" y="508" fill="#94a3b8" font-size="12">tabs + diffs + flags</text>

        <line x1="370" y1="350" x2="370" y2="430" stroke="#60a5fa" stroke-width="3" marker-end="url(#a)"/>
        <line x1="520" y1="485" x2="610" y2="485" stroke="#60a5fa" stroke-width="3" marker-end="url(#a)"/>
        <line x1="910" y1="485" x2="1000" y2="485" stroke="#60a5fa" stroke-width="3" marker-end="url(#a)"/>

        <rect x="120" y="620" width="300" height="120" rx="12" fill="#3f1d1d" stroke="#ef4444"/>
        <text x="145" y="656" fill="#fecaca" font-size="15" font-weight="700">Failure Branch A: GitHub 401</text>
        <text x="145" y="678" fill="#fecaca" font-size="12">Show bad credentials error</text>
        <text x="145" y="698" fill="#fecaca" font-size="12">Sign out → Sign in again</text>

        <rect x="500" y="620" width="300" height="120" rx="12" fill="#3f361d" stroke="#f59e0b"/>
        <text x="525" y="656" fill="#fde68a" font-size="15" font-weight="700">Failure Branch B: LLM Timeout</text>
        <text x="525" y="678" fill="#fde68a" font-size="12">Mark file as llm_call_failed</text>
        <text x="525" y="698" fill="#fde68a" font-size="12">Continue remaining files</text>

        <rect x="880" y="620" width="300" height="120" rx="12" fill="#1d3b2a" stroke="#10b981"/>
        <text x="905" y="656" fill="#bbf7d0" font-size="15" font-weight="700">Success Branch</text>
        <text x="905" y="678" fill="#bbf7d0" font-size="12">Artifacts persisted + PR link</text>
        <text x="905" y="698" fill="#bbf7d0" font-size="12">Review in Projects + Analytics</text>

        <line x1="330" y1="140" x2="270" y2="620" stroke="#ef4444" stroke-width="2.5" marker-end="url(#a)"/>
        <line x1="760" y1="350" x2="650" y2="620" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#a)"/>
        <line x1="1110" y1="540" x2="1030" y2="620" stroke="#10b981" stroke-width="2.5" marker-end="url(#a)"/>
      </svg>
    </div>
  </div>
</body>
</html>
